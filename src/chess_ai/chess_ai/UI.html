<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ROS2 Chess Control Center</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; padding: 20px; }
    .main-container { display: flex; gap: 20px; background: #34495e; padding: 20px; border-radius: 15px; }
    #myBoard { width: 450px; }
    .side-panel { width: 320px; display: flex; flex-direction: column; gap: 15px; }

    .piece-box { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #ecf0f1; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .piece-box img { width: 30px; cursor: grab; transition: 0.2s; }
    .piece-box img:hover { transform: scale(1.1); }

    .control-group { background: #2c3e50; padding: 15px; border-radius: 8px; border: 1px solid #7f8c8d; }
    .slider-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }

    .verification-group { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: #1a252f; border-radius: 8px; border: 2px solid #f1c40f; }
    .ox-container { display: flex; gap: 10px; }

    button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    #btn-ok { background: #2ecc71; color: white; flex: 1; padding: 15px; font-size: 20px; }
    #btn-ng { background: #e74c3c; color: white; flex: 1; padding: 15px; font-size: 20px; }
    #btn-check { background: #f1c40f; color: #2c3e50; width: 100%; padding: 12px; font-size: 16px; display: none; }

    .status-bar { margin-top: 10px; font-size: 13px; color: #f1c40f; text-align: center; font-weight: bold; min-height: 20px; }
    input[readonly] { cursor: default; }

    .working-box-title { font-size: 12px; color: #bdc3c7; margin-bottom: 6px; }
    .working-box-text { font-size: 16px; font-weight: bold; color: #f1c40f; text-align: center; min-height: 24px; }
  </style>
</head>
<body>

  <h2>ROS2 Chess Control UI</h2>

  <div class="main-container">
    <div class="board-area">
      <div class="piece-box" id="external-pieces">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wP.png" data-piece="wP" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wN.png" data-piece="wN" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wB.png" data-piece="wB" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wR.png" data-piece="wR" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png" data-piece="wQ" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wK.png" data-piece="wK" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bP.png" data-piece="bP" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bN.png" data-piece="bN" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bB.png" data-piece="bB" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bR.png" data-piece="bR" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bQ.png" data-piece="bQ" draggable="true">
        <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bK.png" data-piece="bK" draggable="true">
      </div>

      <div id="myBoard"></div>

      <div style="margin-top: 15px;">
        <label style="font-size: 12px; color: #bdc3c7;">Stockfish Recommended Move:</label>
        <input type="text" id="aiMoveDisplay" readonly
          style="width: 100%; background: #2c3e50; color: #f1c40f; border: 1px solid #7f8c8d; padding: 12px; border-radius: 4px; font-size: 18px; font-weight: bold; text-align: center;">
      </div>

      <div class="status-bar" id="status">연결 중...</div>
    </div>

    <div class="side-panel">
      <div class="control-group">
        <div class="slider-label"><span>AI Depth</span><b id="depthVal">15</b></div>
        <input type="range" id="depthRange" min="1" max="30" value="15" style="width:100%">

        <div style="height:10px;"></div>

        <div class="slider-label"><span>AI Difficulty</span><b id="difficultyVal">10</b></div>
        <input type="range" id="difficultyRange" min="1" max="20" value="10" style="width:100%">
      </div>

      <div class="control-group">
        <strong>Turn</strong><br>
        <label><input type="radio" name="turn" value="w" checked> White (Robot)</label><br>
        <label><input type="radio" name="turn" value="b"> Black (Human)</label>
      </div>

      <!-- Turn 아래: 로봇 작동 상태 표시 (sub-phase D4: voice_message dead field 제거) -->
      <div class="control-group">
        <div class="working-box-title">Status</div>
        <div class="working-box-text" id="workingStatusText">-</div>
      </div>

      <!-- 그 아래: O/X 박스 -->
      <div class="verification-group" id="verification-group" style="display: none;">
        <strong style="color: #f1c40f; text-align: center; display: block; margin-bottom: 10px;">Verification</strong>
        <div class="ox-container">
          <button id="btn-ok">O</button>
          <button id="btn-ng">X</button>
        </div>
        <button id="btn-check">CHECK & RE-ANALYZE</button>
        <p style="font-size: 11px; color: #bdc3c7; margin-top: 5px;">
          - O: 승인 (로봇 동작)<br>
          - X: 수동 수정 모드 진입
        </p>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <!-- Phase 5 sub-phase C: rosbridge / roslibjs for ROS2 bridge -->
  <script src="https://static.robotwebtools.org/roslibjs/current/roslib.min.js"></script>

  <script type="module">
    // Phase 5 sub-phase E (2026-05-10): Firebase Web SDK 완전 제거.
    //   D1까지: chess/board_state read → ROS2 /vision/board_state 구독으로 이전.
    //   D1까지: ui_control write/read → ROS2 /main_controller/ui_status + user_decision.
    //   D3:     chess/chess_system → stockfish 노드 ROS2 parameter.
    //   D4:     voice_message dead field 제거.
    //   E:      apiKey 포함 모든 Firebase 자원 제거.
    // UI ↔ ROS2 통신은 rosbridge_websocket을 통한 4개 채널만:
    //   - /vision/board_state (Topic, RELIABLE+TRANSIENT_LOCAL)
    //   - /main_controller/ui_status (Topic, RELIABLE+TRANSIENT_LOCAL)
    //   - /main_controller/user_decision (Service)
    //   - /chess_ai_node/{get,set,...}_parameters (Service, 표준 parameter API)

    // Phase 5 sub-phase C: board_state는 rosbridge 경유 ROS2 토픽 구독
    // file:// URL일 때 hostname이 비어 있으면 localhost로 fallback
    const rosbridgeHost = window.location.hostname || "localhost";
    const ros = new ROSLIB.Ros({ url: `ws://${rosbridgeHost}:9090` });
    ros.on("connection", () => {
      console.log(`[ros] connected to ws://${rosbridgeHost}:9090`);
      $("#status").text("ROS2 연결됨 — 카메라 실시간 인식 대기");
      // sub-phase D3: 연결 후 슬라이더 기본값을 stockfish parameter로 push.
      // 호출이 페이지 로드 즉시면 rosbridge 연결 전 큐잉되어 silent failure 위험.
      pushChessSystem();
    });
    ros.on("error", (err) => {
      console.error("[ros] error:", err);
      $("#status").text("ROS2 연결 오류 (rosbridge 확인 필요)");
    });
    ros.on("close", () => {
      console.warn("[ros] connection closed");
      $("#status").text("ROS2 연결 끊김");
    });

    const boardStateTopic = new ROSLIB.Topic({
      ros: ros,
      name: "/vision/board_state",
      messageType: "chess_ai_interfaces/msg/BoardState",
      // QoS — vision_db publisher와 호환: RELIABLE + TRANSIENT_LOCAL + KEEP_LAST(1)
      // (latched 메시지 수신해 페이지 로드 직후 보드 상태 표시)
      qos_profile_overrides: {
        reliability: 1,    // RELIABLE
        durability: 1,     // TRANSIENT_LOCAL
        depth: 1,
      },
    });

    // Phase 5 sub-phase D1: main_controller → UI 상태 토픽 (verification, working,
    // ai_suggested_move, final_board, controller_state). Firebase ui_control의
    // backend→UI 필드는 이 콜백으로 이전 (D4에서 voice_message dead field 제거 완료).
    const uiStatusTopic = new ROSLIB.Topic({
      ros: ros,
      name: "/main_controller/ui_status",
      messageType: "chess_ai_interfaces/msg/UIStatus",
      qos_profile_overrides: {
        reliability: 1,    // RELIABLE
        durability: 1,     // TRANSIENT_LOCAL
        depth: 1,
      },
    });

    // Phase 5 sub-phase D2: UI → main_controller user_decision Service.
    // Firebase ui_control.user_decision write 대체. UserDecision.srv 정수 enum.
    const DECISION_APPROVED = 0;
    const DECISION_RECHECKED = 1;
    const DECISION_GAME_OVER = 2;
    const userDecisionService = new ROSLIB.Service({
      ros: ros,
      name: "/main_controller/user_decision",
      serviceType: "chess_ai_interfaces/srv/UserDecision",
    });

    // UIStatus.job_id 최신값 — user_decision 호출 시 race protection으로 첨부.
    let latestJobId = "";

    function dictToBoardState(boardDict) {
      const squares = [];
      const pieces = [];
      for (const sq in boardDict) {
        squares.push(sq);
        pieces.push(boardDict[sq]);
      }
      return {
        header: {
          stamp: { sec: 0, nanosec: 0 },
          frame_id: "chess_board",
        },
        squares,
        pieces,
        piece_count: squares.length,
      };
    }

    function callUserDecision(decision, correctedBoardDict) {
      const request = new ROSLIB.ServiceRequest({
        decision,
        job_id: latestJobId,
        corrected_board: dictToBoardState(correctedBoardDict || {}),
      });
      userDecisionService.callService(request, (response) => {
        if (response.accepted) {
          console.log(`[user_decision] accepted: ${response.message}`);
        } else {
          console.warn(`[user_decision] rejected: ${response.message}`);
          $("#status").text(`결정 거부: ${response.message}`);
        }
      }, (error) => {
        console.error("[user_decision] service call failed:", error);
        $("#status").text(`Service 호출 실패: ${error}`);
      });
    }

    let isManualMode = false;
    let verificationOn = false;

    // working 애니메이션 상태
    let workingOn = false;
    let workingTimer = null;
    let workingDotCount = 0;
    let workingStartTimeout = null;

    const board = Chessboard("myBoard", {
      draggable: true,
      dropOffBoard: "trash",
      pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
      onDragStart: function(source, piece, position, orientation) {
        if (!isManualMode) {
          return false;
        }
      }
    });

    function convertToJS(pythonBoard) {
      const newPos = {};
      for (let sq in pythonBoard) {
        const p = pythonBoard[sq];
        newPos[sq.toLowerCase()] = p[0].toLowerCase() + p[1].toUpperCase();
      }
      return newPos;
    }

    // Phase 5 sub-phase D3: chess_system Firebase write 대체.
    // stockfish 노드(/chess_ai_node)의 ROS2 parameter (depth, skill_level, default_turn)를
    // rosbridge SetParameters 표준 service로 직접 설정.
    // ParameterType 상수 (rcl_interfaces/msg/ParameterType): INTEGER=2, STRING=4.
    const stockfishSetParamsService = new ROSLIB.Service({
      ros: ros,
      name: "/chess_ai_node/set_parameters",
      serviceType: "rcl_interfaces/srv/SetParameters",
    });

    function pushChessSystem() {
      const depth = parseInt($("#depthRange").val(), 10);
      const difficulty = parseInt($("#difficultyRange").val(), 10);
      const turn = $('input[name="turn"]:checked').val();

      const request = new ROSLIB.ServiceRequest({
        parameters: [
          { name: "depth", value: { type: 2, integer_value: depth } },
          { name: "skill_level", value: { type: 2, integer_value: difficulty } },
          { name: "default_turn", value: { type: 4, string_value: turn } },
        ],
      });
      stockfishSetParamsService.callService(request, (response) => {
        const results = response.results || [];
        const failed = results.filter((r) => !r.successful);
        if (failed.length > 0) {
          const reasons = failed.map((r) => r.reason).join("; ");
          console.warn(`[set_parameters] some rejected: ${reasons}`);
          $("#status").text(`엔진 설정 거부: ${reasons}`);
        } else {
          console.log(`[set_parameters] ok: depth=${depth} skill=${difficulty} turn=${turn}`);
        }
      }, (error) => {
        console.error("[set_parameters] service call failed:", error);
        $("#status").text(`stockfish parameter 설정 실패: ${error}`);
      });
    }

    $("#depthRange").on("input", e => { $("#depthVal").text(e.target.value); pushChessSystem(); });
    $("#difficultyRange").on("input", e => { $("#difficultyVal").text(e.target.value); pushChessSystem(); });
    $('input[name="turn"]').on("change", () => { pushChessSystem(); });
    // sub-phase D3: 페이지 로드 직후의 즉시 push는 ros.on("connection") 콜백으로 이동.
    // rosbridge 미연결 상태의 silent failure 방지.

    function stopWorkingAnimation() {
      workingOn = false;
      if (workingTimer) { clearInterval(workingTimer); workingTimer = null; }
      if (workingStartTimeout) { clearTimeout(workingStartTimeout); workingStartTimeout = null; }
      workingDotCount = 0;
    }

    function startWorkingAnimationAfter2s() {
      if (workingStartTimeout) clearTimeout(workingStartTimeout);

      workingStartTimeout = setTimeout(() => {
        if (!workingOn) return;

        if (workingTimer) clearInterval(workingTimer);
        workingDotCount = 0;

        workingTimer = setInterval(() => {
          workingDotCount = (workingDotCount % 3) + 1;
          const dots = ".".repeat(workingDotCount);
          $("#workingStatusText").text(`작동 중${dots}`);
        }, 400);
      }, 2000);
    }

    // 실시간 board_state 반영: verification이 꺼져있을 때만
    // Source: ROS2 /vision/board_state via rosbridge (Phase 5 sub-phase C)
    boardStateTopic.subscribe((msg) => {
      if (isManualMode) return;
      if (verificationOn) return;

      // BoardState msg: parallel string arrays (squares[i] ↔ pieces[i])
      if (!msg || !Array.isArray(msg.squares) || !Array.isArray(msg.pieces)) return;
      if (msg.squares.length !== msg.pieces.length) {
        console.warn("[ros] BoardState length mismatch — dropped");
        return;
      }

      const boardDict = {};
      for (let i = 0; i < msg.squares.length; i++) {
        boardDict[msg.squares[i]] = msg.pieces[i];
      }
      const convertedPos = convertToJS(boardDict);
      board.position(convertedPos);
      $("#status").text("카메라 실시간 인식 중...");
    });

    // Phase 5 sub-phase D1: backend → UI 상태는 ROS2 UIStatus 토픽에서 읽기.
    // verification / working / ai_suggested_move / final_board 모두 이 콜백으로 이전.
    uiStatusTopic.subscribe((msg) => {
      if (!msg) return;

      // D2 race protection: 최신 job_id를 추적하여 user_decision 호출 시 첨부.
      latestJobId = msg.job_id || "";

      // 추천 수 표시. 빈 문자열도 그대로 반영해 SAMPLING 진입 시 이전 게임 잔류 방지.
      $("#aiMoveDisplay").val(msg.ai_suggested_move || "");

      // verification 모드
      verificationOn = (msg.verification === true);

      if (verificationOn) {
        $("#verification-group").fadeIn();
        $("#status").text("인식 결과 확인 중. O 또는 X를 눌러주세요.");

        // 핵심: verification 중에는 final_board만 표시
        if (!isManualMode && msg.final_board
            && Array.isArray(msg.final_board.squares)
            && Array.isArray(msg.final_board.pieces)
            && msg.final_board.squares.length === msg.final_board.pieces.length
            && msg.final_board.squares.length > 0) {
          const finalDict = {};
          for (let i = 0; i < msg.final_board.squares.length; i++) {
            finalDict[msg.final_board.squares[i]] = msg.final_board.pieces[i];
          }
          const convertedPos = convertToJS(finalDict);
          board.position(convertedPos);
        }
      } else {
        $("#verification-group").fadeOut();
      }

      // working 모드 (로봇 동작 중)
      if (msg.working === true) {
        if (!workingOn) {
          workingOn = true;
          // 감지! 다음 단계로 작동 중...을 2초 후부터 표시
          startWorkingAnimationAfter2s();
        }
      } else {
        if (workingOn) {
          stopWorkingAnimation();
          // working 종료 시 idle 상태로 복귀
          $("#workingStatusText").text("-");
        }
      }
    });

    // sub-phase D4: Firebase ui_control listener 제거. voice_message는 dead field
    // (음성 모듈 2026-05-04 제거 후 lastVoiceMessage는 항상 "" 잔류). controlRef
    // 자체도 제거 — UI는 이제 ui_status / user_decision / set_parameters 3개 ROS2
    // 채널로만 main과 통신.

    $("#btn-ok").click(() => {
      isManualMode = false;
      $("#btn-check").hide();

      // 현재 보드 상태를 corrected_board로 함께 보냄 — 사용자가 수동 수정 후 승인한
      // 케이스 대응. main이 비어있지 않으면 _final_board를 갱신한 뒤 RUNNING 진입.
      const currentPos = board.position();
      const pythonFormatBoard = {};
      for (let sq in currentPos) {
        const p = currentPos[sq];
        pythonFormatBoard[sq.toUpperCase()] = p[0].toUpperCase() + p[1].toUpperCase();
      }

      callUserDecision(DECISION_APPROVED, pythonFormatBoard);
      $("#status").text("승인됨: 로봇이 이동합니다.");
    });

    $("#btn-ng").click(() => {
      isManualMode = true;
      $("#btn-check").fadeIn();
      $("#status").text("수정 모드: 기물을 옮긴 후 CHECK를 누르세요.");
    });

    $("#btn-check").click(() => {
      const currentPos = board.position();
      const pythonFormatBoard = {};

      for (let sq in currentPos) {
        const p = currentPos[sq];
        pythonFormatBoard[sq.toUpperCase()] = p[0].toUpperCase() + p[1].toUpperCase();
      }

      callUserDecision(DECISION_RECHECKED, pythonFormatBoard);

      $("#btn-check").hide();
      isManualMode = false;
      $("#status").text("수정 완료. 메인에 전달하여 최종 보드로 반영 중...");
    });

    $("#external-pieces img").on("dragstart", function(e) {
      if (!isManualMode) {
        e.preventDefault();
        return false;
      }
      e.originalEvent.dataTransfer.setData("piece", $(this).data("piece"));
    });

    $("#myBoard").on("dragover", e => e.preventDefault());

    $("#myBoard").on("drop", function(e) {
      if (!isManualMode) return;

      e.preventDefault();
      const piece = e.originalEvent.dataTransfer.getData("piece");
      const elementAtPoint = document.elementFromPoint(e.clientX, e.clientY);
      const squareEl = $(elementAtPoint).closest("[data-square]");
      const square = squareEl.data("square");

      if (square && piece) {
        const currentPos = board.position();
        currentPos[square] = piece;
        board.position(currentPos);
      }
    });
  </script>
</body>
</html>
